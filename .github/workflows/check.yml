name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python scripts/check.py
      - run: python scripts/check_tests.py
      - run: python scripts/generate_plan_index_tests.py
      # The backlog's frontmatter is authoritative and its index generated:
      # regenerating must validate every plan and change nothing.
      - run: python skills/improve/resources/generate_plan_index.py --plans-dir docs/dev/plans
      - run: git diff --exit-code -- docs/dev/plans
